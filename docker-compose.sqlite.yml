services:
  app:
    image: ${LSKY_IMAGE:-ghcr.io/inspoaibox/lksypro-mc:latest}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8080}
      DB_CONNECTION: sqlite
      DB_DATABASE: ${SQLITE_DATABASE:-/var/www/html/storage/runtime/database.sqlite}
      CACHE_DRIVER: file
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: ${SESSION_DRIVER:-cookie}
    volumes:
      - lsky_storage:/var/www/html/storage
      - lsky_bootstrap_cache:/var/www/html/bootstrap/cache

volumes:
  lsky_storage:
  lsky_bootstrap_cache:
