name: Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - dev
      - main
      - master

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: inspoaibox/lksypro-mc

jobs:
  install-tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        database:
          - sqlite
          - mysql
          - pgsql

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: lsky_test
          MYSQL_USER: lsky
          MYSQL_PASSWORD: lsky
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ulsky -plsky --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lsky_test
          POSTGRES_USER: lsky
          POSTGRES_PASSWORD: lsky
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -h 127.0.0.1 -U lsky -d lsky_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: bcmath, curl, dom, fileinfo, gd, imagick, intl, mbstring, pdo_mysql, pdo_pgsql, pdo_sqlite, xml, zip
          coverage: none

      - name: Copy env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader

      - name: Generate application key
        run: php artisan key:generate --force

      - name: Prepare writable paths
        run: |
          chmod -R 777 storage bootstrap/cache
          mkdir -p database

      - name: Install database
        shell: bash
        run: |
          PHP=(php -d disable_functions=symlink)

          case "${{ matrix.database }}" in
            sqlite)
              "${PHP[@]}" artisan lsky:install \
                --connection=sqlite
              ;;
            mysql)
              "${PHP[@]}" artisan lsky:install \
                --connection=mysql \
                --host=127.0.0.1 \
                --port=3306 \
                --database=lsky_test \
                --username=lsky \
                --password=lsky
              ;;
            pgsql)
              "${PHP[@]}" artisan lsky:install \
                --connection=pgsql \
                --host=127.0.0.1 \
                --port=5432 \
                --database=lsky_test \
                --username=lsky \
                --password=lsky
              ;;
          esac

      - name: Verify JSON update
        run: |
          php artisan tinker --execute="App\Models\Strategy::query()->update(['configs->url' => 'http://localhost/i']); throw_unless(App\Models\Strategy::query()->first()->configs->get('url') === 'http://localhost/i');"

      - name: Verify local output fallback
        if: ${{ matrix.database == 'sqlite' }}
        run: |
          rm -rf public/i
          php -d disable_functions=symlink vendor/bin/phpunit --filter LocalImageOutputTest

  build:
    runs-on: ubuntu-latest
    needs: install-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/dev' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PHP_VERSION=8.2
            NODE_VERSION=20
